services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ziradesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ziradesk
      POSTGRES_USER: ziradesk
      POSTGRES_PASSWORD: ziradesk
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ziradesk -d ziradesk']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ziradesk-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
