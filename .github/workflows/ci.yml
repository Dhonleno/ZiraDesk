name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ziradesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ziradesk?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-with-minimum-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-with-minimum-32-chars
      NODE_ENV: test
      STORAGE_PROVIDER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@9.0.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ziradesk/shared build

      - name: Run migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy

      - name: Run API tests
        working-directory: apps/api
        run: pnpm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Railway Deploy Webhook
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
        run: |
          set -euo pipefail
          WEBHOOK="$(echo "${RAILWAY_DEPLOY_WEBHOOK:-}" | tr -d '\r' | xargs)"

          if [ -z "$WEBHOOK" ]; then
            echo "RAILWAY_DEPLOY_WEBHOOK secret is empty or not configured."
            exit 1
          fi

          case "$WEBHOOK" in
            http://*|https://*) ;;
            *)
              echo "RAILWAY_DEPLOY_WEBHOOK must be a full URL (http/https)."
              exit 1
              ;;
          esac

          curl --fail --show-error --silent -X POST "$WEBHOOK"
