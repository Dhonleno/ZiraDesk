name: Backup Manual

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite "backup" para confirmar'
        required: true
        type: string

jobs:
  backup:
    name: Executar backup na VPS
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'backup'

    steps:
      - name: Executar backup via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 85.239.245.8
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            /home/deploy/scripts/backup.sh
            echo "--- Últimas linhas do log ---"
            tail -20 /home/deploy/ziradesk-backup.log
            echo "--- Arquivos no R2 ---"
            rclone ls r2:ziradesk-backups \
              --config /home/deploy/.config/rclone/rclone.conf
